<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualiza parámetros</title>
    <style>
        /* ========== RESET ========== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ========== BASE ========== */
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #c6e6c6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .form-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(76, 175, 80, 0.15);
            padding: 32px;
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #4caf50, #8bc34a, #cddc39);
        }

        /* ========== HEADER ========== */
        .form-header {
            text-align: center;
        }

        .form-header h1 {
            color: #2e7d32;
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        /* ========== FORM ========== */
        .password-wrapper,
        .form-group {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group2 {
            position: relative;
            display: flex;
            justify-content: space-between;
            flex-direction: row;
            gap: 6px;
        }

        .form-group label {
            font-size: 13px;
            color: #388e3c;
        }

        .select-container {
            position: relative;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #c8e6c9;
            border-radius: 6px;
            font-size: 14px;
            color: #383838;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group input[type="password"] {
            padding: 10px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #c8e6c9;
        }

        /* ========== SLIDERS UNIVERSALES ========== */
        /* Contenedor del slider con progreso visual */
        .slider-container {
            position: relative;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 4px;
        }

        .slider-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 8px;
            border-radius: 4px;
            pointer-events: none;
            width: 100%;
        }

        /* Slider base - posicionado absolutamente sobre la barra */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            outline: none;
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            z-index: 2;
            cursor: pointer;
            height: 20px;
            margin: 0;
        }

        /* Track (rail) - hacerlo invisible */
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: transparent;
            border: none;
        }

        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 8px;
            background: transparent;
            border: none;
        }

        /* Thumbs base para todos */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            margin-top: -6px;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* Slider Azul */
        .slider-container:has(#ledA) .slider-progress {
            background: #e0e0e0;
        }

        #ledA::-webkit-slider-thumb {
            background: #2196F3;
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.5);
        }

        #ledA::-moz-range-thumb {
            background: #2196F3;
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.5);
        }

        /* Slider Rojo */
        .slider-container:has(#ledR) .slider-progress {
            background: #e0e0e0;
        }

        #ledR::-webkit-slider-thumb {
            background: #f44336;
            box-shadow: 0 2px 8px rgba(244, 67, 54, 0.5);
        }

        #ledR::-moz-range-thumb {
            background: #f44336;
            box-shadow: 0 2px 8px rgba(244, 67, 54, 0.5);
        }

        /* Slider Blanco */
        .slider-container:has(#ledB) .slider-progress {
            background: #e0e0e0;
        }

        #ledB::-webkit-slider-thumb {
            background: #ffffff;
            border: 2px solid #9e9e9e;
            box-shadow: 0 2px 8px rgba(158, 158, 158, 0.5);
        }

        #ledB::-moz-range-thumb {
            background: #ffffff;
            border: 2px solid #9e9e9e;
            box-shadow: 0 2px 8px rgba(158, 158, 158, 0.5);
        }

        .toggle-password {
            position: absolute;
            right: 3%;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #757575;
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            line-height: 1;
        }

        .toggle-password:hover {
            color: #4caf50;
        }

        /* ========== BUTTONS ========== */
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }

        button {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: white;
            box-shadow: 0 4px 16px rgba(76, 175, 80, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff7043, #ff8a65);
            color: white;
            box-shadow: 0 4px 16px rgba(255, 112, 67, 0.3);
        }

        .footer {
            padding-top: 32px;
            text-align: center;
        }

        .footer p {
            color: #558b2f;
            font-size: 14px;
        }

        /* ========== RESPONSE ========== */
        .mensaje-ok,
        .mensaje-error {
            padding: 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
        }

        .mensaje-ok {
            background: #e8f5e9;
            border: 2px solid #4caf50;
            color: #2e7d32;
        }

        .mensaje-error {
            background: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 480px) {
            .form-card {
                padding: 24px;
                margin: 10px;
            }

            .form-header h1 {
                font-size: 20px;
            }

            .buttons {
                flex-direction: column;
            }

            button {
                padding: 14px 20px;
                font-size: 14px;
            }

            .toggle-password {
                font-size: 18px;
            }
        }

        @media (max-width: 320px) {
            .form-card {
                padding: 20px;
            }

            .form-header h1 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="form-card" id="form-card">
        <div class="form-header">
            <h1 id="headerCon">Actualiza los parámetros.</h1>
        </div>

        <form id="mainForm">
            <div id="stepParams">
                <div class="form-group">
                    <label>Planta</label>
                    <input type="text" name="planta" autocomplete="off" id="planta" required>
                </div>

                <div class="form-group2">
                    <div class="form-group">
                        <label for="activarSistema">Sistema activo:</label>
                        <input type="checkbox" id="enable" name="enable">
                    </div>

                    <div class="form-group">
                        <label for="fotoperiodo">Fotoperiodo (h):</label>
                        <input type="number" id="fp" name="fp" min="0" max="23">
                    </div>
                </div>

                <div class="form-group">
                    <label for="luzAzul">Led Azul: <span id="luzAzulValue">50%</span></label>
                    <div class="slider-container">
                        <input type="range" id="ledA" name="ledA" min="0" max="100" step="5" value="0">
                        <div class="slider-progress" id="progressA"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="luzRoja">Led Rojo: <span id="luzRojaValue">50%</span></label>
                    <div class="slider-container">
                        <input type="range" id="ledR" name="ledR" min="0" max="100" step="5" value="0">
                        <div class="slider-progress" id="progressR"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="luzBlanca">Led Blanco: <span id="luzBlancaValue">50%</span></label>
                    <div class="slider-container">
                        <input type="range" id="ledB" name="ledB" min="0" max="100" step="5" value="0">
                        <div class="slider-progress" id="progressB"></div>
                    </div>
                </div>

                <div class="form-group2">
                    <div class="form-group">
                        <label>Riego</label>
                        <div class="select-container">
                            <select id="irrH" name="irrH" required>
                                <option value="0">0 veces al día</option>
                                <option value="1">1 vez al día</option>
                                <option value="2">2 veces al día</option>
                                <option value="3">4 veces al día</option>
                                <option value="4">8 veces al día</option>
                                <option value="5">12 veces al día</option>
                                <option value="6">24 veces al día</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>minutos</label>
                        <input type="number" name="irrM" required id="irrM" min="0" max="59">
                    </div>
                </div>

                <div class="form-group2">
                    <div class="form-group">
                        <label>Ventilación</label>
                        <div class="select-container">
                            <select id="ventH" name="ventH" required>
                                <option value="0">0 veces al día</option>
                                <option value="1">1 vez al día</option>
                                <option value="2">2 veces al día</option>
                                <option value="3">4 veces al día</option>
                                <option value="4">8 veces al día</option>
                                <option value="5">12 veces al día</option>
                                <option value="6">24 veces al día</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>minutos</label>
                        <input type="number" name="ventM" required id="ventM" min="0" max="59">
                    </div>
                </div>

                <div class="buttons">
                    <button type="button" class="btn-primary" id="btnContinue">Continuar</button>
                    <button type="button" class="btn-secondary" onclick="window.location.href='/exit'">Salir</button>
                </div>
            </div>

            <div id="stepAuth" style="display:none;">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" name="user" id="user" autocomplete="off" required>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="pass" autocomplete="new-password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()" id="toggleBtn">👁</button>
                    </div>
                </div>

                <div class="buttons">
                    <button type="submit" class="btn-primary">Actualizar</button>
                    <button type="button" class="btn-secondary" onclick="window.location.href='/exit'">Salir</button>
                </div>
            </div>
        </form>

        <div class="footer">
            <p>© 2024 Smartplant • Versión 1.0</p>
        </div>
    </div>

    <script>
        var valoresESP32 = {
            dispositivoActivo: "",
            fotoperiodo: "",
            luzAzul: "",
            luzRoja: "",
            luzBlanca: "",
            horasIrrigacion: "",
            minutosIrrigacion: "",
            horasVentilador: "",
            minutosVentilador: "",
        }

        function actualizarFormulario() {
            document.getElementById('enable').checked = valoresESP32.dispositivoActivo;
            document.getElementById('fp').value = valoresESP32.fotoperiodo;
            document.getElementById('ledA').value = valoresESP32.luzAzul;
            document.getElementById('luzAzulValue').innerText = `${valoresESP32.luzAzul}%`;
            document.getElementById('ledR').value = valoresESP32.luzRoja;
            document.getElementById('luzRojaValue').innerText = `${valoresESP32.luzRoja}%`;
            document.getElementById('ledB').value = valoresESP32.luzBlanca;
            document.getElementById('luzBlancaValue').innerText = `${valoresESP32.luzBlanca}%`;
            document.getElementById('irrH').value = valoresESP32.horasIrrigacion;
            document.getElementById('irrM').value = valoresESP32.minutosIrrigacion;
            document.getElementById('ventH').value = valoresESP32.horasVentilador;
            document.getElementById('ventM').value = valoresESP32.minutosVentilador;
            
            // Actualizar barras de progreso
            updateSliderProgress('ledA', 'progressA');
            updateSliderProgress('ledR', 'progressR');
            updateSliderProgress('ledB', 'progressB');
        }

        document.addEventListener('DOMContentLoaded', actualizarFormulario);

        const form = document.getElementById("mainForm");
        const stepParams = document.getElementById("stepParams");
        const stepAuth = document.getElementById("stepAuth");
        const btnContinue = document.getElementById("btnContinue");

        const repetidosRegex = /(.)\1{3,}/;
        let errores = [];

        function isAlphaNumeric(str) {
            return /^[a-zA-Z0-9_.-]+$/.test(str);
        }

        function isValidPassword(str) {
            return /^[a-zA-Z0-9!@#$%^&*()_+\-=.,]+$/.test(str);
        }

        function togglePassword() {
            const type = password.type === 'password' ? 'text' : 'password';
            password.type = type;
            document.getElementById('toggleBtn').textContent = type === 'password' ? '👁' : '👁';
        }

        btnContinue.addEventListener("click", () => {
            errores = validarParametros();
            if (errores.length > 0) {
                alert("Errores en el formulario:\n" + errores.join("\n"));
                return;
            }
            stepParams.style.display = "none";
            stepAuth.style.display = "block";
        });

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            errores = validarAuth();
            if (errores.length > 0) {
                alert("Errores en el formulario:\n" + errores.join("\n"));
                return;
            }

            const formData = new FormData(form);
            const data = {};

            formData.forEach((value, key) => {
                if (key === 'fp' || key === 'irrH' || key === 'irrM' ||
                    key === 'ventH' || key === 'ventM' ||
                    key === 'ledA' || key === 'ledR' || key === 'ledB')
                    data[key] = Number(value.trim())
                else
                    data[key] = value.trim();
            });

            data.enable = document.getElementById("enable").checked;
            const fechaHoraActual = new Date();
            data['dia'] = Number(fechaHoraActual.getDate());
            data['mes'] = Number(fechaHoraActual.getMonth() + 1);
            data['anio'] = Number(fechaHoraActual.getFullYear().toString().slice(-2));
            data['diaSem'] = Number(fechaHoraActual.getDay());
            data['hr'] = Number(fechaHoraActual.getHours());
            data['min'] = Number(fechaHoraActual.getMinutes());
            data['seg'] = Number(fechaHoraActual.getSeconds());

            console.log(data);

            fetch("/newparams", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
            .then(async (res) => {
                const json = await res.json();
                const container = document.getElementById("form-card");

                if (res.ok && json.ok) {
                    container.innerHTML = `<div class="mensaje-ok">${json.message}</div>`;
                } else {
                    container.innerHTML = `<div class="mensaje-error">${json.error || "Error desconocido"}</div>`;
                }
            }).catch(() => {
                document.getElementById("form-card").innerHTML = `<div class="mensaje-error">Error de comunicación con el dispositivo</div>`;
            });
        });

        function validarParametros() {
            errores = [];
            const planta = document.getElementById("planta").value.trim();
            const fpInput = document.getElementById("fp").value.trim();
            const irrMinInput = document.getElementById("irrM").value.trim();
            const ventMinInput = document.getElementById("ventM").value.trim();

            if (fpInput === "") {
                errores.push("El campo fotoperiodo es obligatorio y numérico");
            }
            if (irrMinInput === "") {
                errores.push("El campo riego-minutos es obligatorio y numérico");
            }
            if (ventMinInput === "") {
                errores.push("El campo ventilación-minutos es obligatorio y numérico");
            } else {
                const fotoperiodo = Number(fpInput);
                const irrigacionMinutos = Number(irrMinInput);
                const ventilacionMinutos = Number(ventMinInput);

                if (planta.length < 5 || planta.length > 16 || !isAlphaNumeric(planta))
                    errores.push("El nombre de la planta debe ser entre 5 y 16 caracteres alfanuméricos");
                if (isNaN(fotoperiodo) || fotoperiodo < 0 || fotoperiodo > 23)
                    errores.push("El fotoperiodo debe ser un valor entre 0 y 23 horas");
                if (isNaN(irrigacionMinutos) || irrigacionMinutos < 0 || irrigacionMinutos > 59)
                    errores.push("El valor de riego debe ser un valor entre 0 y 59 minutos");
                if (isNaN(ventilacionMinutos) || ventilacionMinutos < 0 || ventilacionMinutos > 59)
                    errores.push("El valor de ventilación debe ser un valor entre 0 y 59 minutos");
            }

            return errores;
        }

        function validarAuth() {
            errores = [];
            const user = document.getElementById("user").value.trim();
            const pass = document.getElementById("password").value.trim();

            if (!isAlphaNumeric(user))
                errores.push("El usuario solo debe tener caracteres alfanumericos y (_-.)");
            if (!isValidPassword(pass))
                errores.push("La contraseña solo debe tener caracteres alfanumericos y (!@#$%^&*()_+\-=.,)");
            if (user.length < 4 || user.length > 16)
                errores.push("El usuario debe tener entre 4 y 16 caracteres.");
            if (pass.length < 8 || pass.length > 32)
                errores.push("La contraseña debe tener entre 8 y 32 caracteres.");
            if (repetidosRegex.test(user))
                errores.push("El usuario no puede contener más de 3 caracteres repetidos seguidos.");
            if (repetidosRegex.test(pass))
                errores.push("La contraseña no puede contener más de 3 caracteres repetidos seguidos.");

            return errores;
        }

        // Función universal para actualizar progreso y valor
        function updateSliderProgress(sliderId, progressId) {
            const slider = document.getElementById(sliderId);
            const progress = document.getElementById(progressId);
            
            if (!slider || !progress) return;
            
            const percent = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
            
            // Crear el gradiente según el slider
            let color;
            if (sliderId === 'ledA') color = '#2196F3';
            else if (sliderId === 'ledR') color = '#f44336';
            else if (sliderId === 'ledB') color = '#ffffff';
            
            if (sliderId === 'ledB') {
                progress.style.background = `linear-gradient(to right, ${color} 0%, ${color} ${percent}%, #e0e0e0 ${percent}%, #e0e0e0 100%)`;
                progress.style.border = '1px solid #9e9e9e';
            } else {
                progress.style.background = `linear-gradient(to right, ${color} 0%, ${color} ${percent}%, #e0e0e0 ${percent}%, #e0e0e0 100%)`;
            }
        }

        function updateLampValue(sliderId, valueId, progressId) {
            const slider = document.getElementById(sliderId);
            const valueLabel = document.getElementById(valueId);

            if (!slider || !valueLabel) return;

            valueLabel.textContent = `${slider.value}%`;
            updateSliderProgress(sliderId, progressId);

            slider.addEventListener("input", () => {
                valueLabel.textContent = `${slider.value}%`;
                updateSliderProgress(sliderId, progressId);
            });
        }

        updateLampValue('ledA', 'luzAzulValue', 'progressA');
        updateLampValue('ledR', 'luzRojaValue', 'progressR');
        updateLampValue('ledB', 'luzBlancaValue', 'progressB');
    </script>
</body>
</html>
